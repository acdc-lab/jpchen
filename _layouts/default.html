<!doctype html>
<html lang="{{ site.lang | default: "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.tagline }}">
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}?v=20260609-photo-tight">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ "/assets/img/favicon.svg" | relative_url }}">
</head>
<body class="theme-auto">
  {% include nav.html %}

  <div class="site-shell">
    <aside class="sidebar">
      <div class="profile-box">
        <div class="profile-photo-frame">
          <img class="profile-photo" src="{{ "/assets/img/profile.jpg" | relative_url }}" alt="Profile photo of Prof. Jinpeng Chen">
        </div>
        <h1 class="profile-name">Prof. Jinpeng Chen</h1>
        <p class="profile-title">Associate Professor @ BUPT</p>
        <ul class="profile-meta">
          <li>Vice Dean</li>
          <li>Doctoral Supervisor</li>
          <li>CCF/CIC Senior Member</li>
          <li>IEEE/ACM Member</li>
          <li>Beijing, China</li>
        </ul>
        <ul class="profile-links">
          <li><a href="mailto:jpchen@bupt.edu.cn">Email</a></li>
          <li><a href="{{ "/" | relative_url }}">Homepage</a></li>
        </ul>
      </div>
    </aside>

    <main class="page">
      <div class="page__inner-wrap">
        <section class="page__content">
          {{ content }}
        </section>
      </div>
    </main>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>© {{ "now" | date: "%Y" }} {{ site.author.name }}</span>
      <span>Designed by Y&amp;M</span>
      <button id="toggleTheme" aria-label="Toggle theme">Toggle theme</button>
    </div>
  </footer>

<script>
  const key='pref-theme';
  const btn=document.getElementById('toggleTheme');
  const apply=(m)=>document.documentElement.dataset.theme=m;
  const saved=localStorage.getItem(key);
  if(saved){apply(saved)}else{apply('auto')}
  btn?.addEventListener('click', ()=>{
    const cur=document.documentElement.dataset.theme;
    const next= cur==='dark' ? 'light' : cur==='light' ? 'auto' : 'dark';
    localStorage.setItem(key,next); apply(next);
  });
</script>
</body>
</html>
